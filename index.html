<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌧️ canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* 🌫️ blur layer */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.45);
}

/* 💀 main card */
.card {
    position: relative;
    z-index: 2;
    width: 320px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    box-shadow: 0 0 25px rgba(0,255,200,0.08);
}

.pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.15);
}

/* 🟢 status dot */
.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 10px;
}

/* glow colors */
.online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
.idle { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
.dnd { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
.offline { background: #7f8c8d; box-shadow: 0 0 10px #7f8c8d; }

h1 {
    margin: 10px 0 5px;
    font-size: 26px;
}

#statusText {
    font-size: 13px;
    color: #aaa;
    height: 18px;
}

.activity {
    font-size: 12px;
    color: #00ffc8;
    margin-top: 5px;
}

/* buttons */
a {
    display: block;
    margin: 8px auto;
    width: 200px;
    padding: 10px;
    text-decoration: none;
    color: white;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.25s;
}

a:hover {
    background: rgba(0,255,200,0.15);
    transform: scale(1.05);
}

/* ⚡ glitch intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    letter-spacing: 3px;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { opacity: 1; transform: translate(0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-1px,1px); }
    80% { opacity: 0.8; }
    100% { opacity: 1; }
}
</style>
</head>

<body>

<!-- ⚡ INTRO -->
<div id="intro">LOADING PROFILE...</div>

<canvas id="rain"></canvas>
<div class="overlay"></div>

<div class="card">
    <img id="avatar" class="pfp">
    <h1 id="name">Loading...</h1>

    <div>
        <span id="dot" class="status-dot offline"></span>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="activity" id="activity"></div>

    <a href="https://discord.gg/jfzVYKyBPe" target="_blank">
        Discord Invite: Obsidian Advertising
    </a>

    <a href="https://github.com" target="_blank">GitHub</a>
</div>

<script>
const USER_ID = "618051457236598785";

/* typing animation */
let typingIndex = 0;
let typingText = "";
let typingSpeed = 40;

function type(text) {
    typingText = "";
    typingIndex = 0;
    clearInterval(window.typingInterval);

    window.typingInterval = setInterval(() => {
        typingText += text[typingIndex];
        document.getElementById("statusText").innerText = typingText;
        typingIndex++;

        if (typingIndex >= text.length) {
            clearInterval(window.typingInterval);
        }
    }, typingSpeed);
}

/* status logic */
function setStatus(status) {
    const dot = document.getElementById("dot");

    dot.className = "status-dot " + status;

    if (status === "online") type("Leon is online and active...");
    if (status === "idle") type("Leon is away right now...");
    if (status === "dnd") type("Leon is busy. Do not disturb.");
    if (status === "offline") type("Leon is currently offline.");
}

/* fetch discord */
async function load() {
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        const d = json.data;

        // avatar
        const avatar = d.discord_user.avatar
            ? `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`
            : `https://cdn.discordapp.com/embed/avatars/0.png`;

        document.getElementById("avatar").src = avatar;

        // name
        document.getElementById("name").innerText =
            d.discord_user.global_name || d.discord_user.username;

        // status
        setStatus(d.discord_status);

        // activity
        if (d.activities && d.activities.length > 0) {
            document.getElementById("activity").innerText =
                "Playing: " + d.activities[0].name;
        } else {
            document.getElementById("activity").innerText = "";
        }

    } catch (e) {
        setStatus("offline");
    }
}

load();

/* hide intro */
setTimeout(() => {
    document.getElementById("intro").style.display = "none";
}, 1500);

/* rain */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 120; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        l: Math.random() * 20 + 10,
        s: Math.random() * 5 + 2
    });
}

function rain() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = "rgba(0,255,200,0.12)";

    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y + d.l);
        ctx.stroke();

        d.y += d.s;
        if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(rain);
}

rain();
</script>

</body>
</html>
