<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    color: white;
}

.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,200,0.08), transparent 60%);
}

.card {
    position: relative;
    z-index: 2;
    width: 320px;
    padding: 25px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
}

.pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 10px;
}

h1 {
    margin: 5px 0;
    font-size: 22px;
}

/* STATUS */
.status {
    font-size: 13px;
    margin-bottom: 15px;
}

.online-text { color: #2ecc71; }
.idle-text { color: #f1c40f; }
.dnd-text { color: #e74c3c; }
.offline-text { color: #7f8c8d; }

.dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
}

.online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
.idle { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
.dnd { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
.offline { background: #7f8c8d; box-shadow: 0 0 10px #7f8c8d; }

/* bouncing dots */
.dots {
    display: inline-flex;
    margin-left: 5px;
}

.dots span {
    width: 4px;
    height: 4px;
    margin: 0 2px;
    background: currentColor;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
}

.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

/* 🎵 Spotify section */
.spotify {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
}

.spotify a {
    display: inline-block;
    margin: 5px 5px 0;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.2s;
}

.spotify a:hover {
    background: rgba(0,255,200,0.15);
}

/* 🔥 MAIN BUTTON */
.button {
    display: block;
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-size: 15px;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffc8, #00bfff);
    box-shadow: 0 0 15px rgba(0,255,200,0.5);
    animation: pulse 2s infinite;
    transition: 0.2s;
}

.button:hover {
    transform: scale(1.08);
}

/* pulse animation */
@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(0,255,200,0.4); }
    50% { box-shadow: 0 0 25px rgba(0,255,200,0.9); }
    100% { box-shadow: 0 0 10px rgba(0,255,200,0.4); }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <img id="avatar" class="pfp">
    <h1 id="name">Loading...</h1>

    <div class="status">
        <span id="dot" class="dot offline"></span>
        <span id="statusText" class="offline-text">Loading</span>
        <span class="dots"><span></span><span></span><span></span></span>
    </div>

    <!-- Spotify -->
    <div id="spotify" class="spotify"></div>

    <!-- MAIN CTA -->
    <a class="button" href="https://discord.gg/jfzVYKyBPe" target="_blank">
        Join Advertising Server
    </a>
</div>

<script>
const USER_ID = "618051457236598785";

/* typing */
function typeText(text, className) {
    const el = document.getElementById("statusText");
    el.className = className;
    el.innerText = "";

    let i = 0;
    const interval = setInterval(() => {
        el.innerText += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 30);
}

/* status */
function setStatus(status) {
    const dot = document.getElementById("dot");
    dot.className = "dot " + status;

    if (status === "online") typeText("Leon is online", "online-text");
    else if (status === "idle") typeText("Leon is idle", "idle-text");
    else if (status === "dnd") typeText("Leon is busy", "dnd-text");
    else typeText("Leon is offline / hidden", "offline-text");
}

/* load */
async function load() {
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        const d = json.data;

        // avatar
        const avatar = d.discord_user.avatar
            ? `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`
            : `https://cdn.discordapp.com/embed/avatars/0.png`;

        document.getElementById("avatar").src = avatar;

        // name
        document.getElementById("name").innerText =
            d.discord_user.global_name || d.discord_user.username;

        // status
        setStatus(d.discord_status);

        // spotify
        const sp = document.getElementById("spotify");
        if (d.listening_to_spotify) {
            const song = d.spotify.song;
            const artist = d.spotify.artist;
            const url = `https://open.spotify.com/search/${encodeURIComponent(song + " " + artist)}`;

            sp.innerHTML = `
                Listening to:
                <br>
                <a href="${url}" target="_blank">${song}</a>
                <a href="${url}" target="_blank">${artist}</a>
            `;
        } else {
            sp.innerHTML = "";
        }

    } catch {
        document.getElementById("statusText").innerText = "offline";
    }
}

load();
</script>

</body>
</html>
