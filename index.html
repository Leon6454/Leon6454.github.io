<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon</title>

<style>
:root{
    --bg:#0a0d12;
    --panel:#11161f;
    --panel2:#0f141c;
    --accent:#00ffc8;
    --text:#ffffff;
    --muted:#8b98a5;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    background:var(--bg);
    font-family:Arial,sans-serif;
    color:var(--text);
    overflow:hidden;
    display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:80px;
    background:#0b0f14;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:12px 0;
    gap:12px;
    border-right:1px solid rgba(255,255,255,0.05);
}

.server{
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.2s;
    font-size:18px;
}

.server:hover{
    transform:scale(1.1);
    background:rgba(0,255,200,0.2);
}

/* ===== MAIN AREA ===== */
.main{
    flex:1;
    display:flex;
}

/* ===== CHANNEL PANEL ===== */
.channels{
    width:200px;
    background:var(--panel2);
    padding:12px;
    border-right:1px solid rgba(255,255,255,0.05);
}

.channel{
    padding:10px;
    border-radius:8px;
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    transition:.2s;
}

.channel:hover{
    background:rgba(255,255,255,0.05);
    color:white;
}

.channel.active{
    background:rgba(0,255,200,0.1);
    color:var(--accent);
}

/* ===== CONTENT ===== */
.content{
    flex:1;
    padding:20px;
    position:relative;
}

/* panels */
.panel{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transform:translateY(10px);
    transition:.3s ease;
    pointer-events:none;
}

.panel.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

/* ===== PROFILE CARD ===== */
.card{
    width:320px;
    background:var(--panel);
    padding:20px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.06);
}

/* avatar */
.avatar-wrap{
    position:relative;
    width:90px;
    height:90px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
}

/* glow ring */
.ring{
    position:absolute;
    inset:-4px;
    border-radius:50%;
    border:2px solid transparent;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px rgba(0,255,200,0.3);}
    50%{box-shadow:0 0 20px rgba(0,255,200,0.7);}
    100%{box-shadow:0 0 10px rgba(0,255,200,0.3);}
}

.name{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

/* status */
.status{
    font-size:13px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:5px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
}

.online{background:#2ecc71;}
.idle{background:#f1c40f;}
.dnd{background:#e74c3c;}
.offline{background:#7f8c8d;}

/* ===== SPOTIFY ===== */
.spotify{
    margin-top:15px;
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.04);
}

.spotify img{
    width:50px;
    height:50px;
    border-radius:8px;
}

.sp-text{
    font-size:12px;
    text-align:left;
}

.sp-text .artist{font-weight:bold;}
.sp-text .song{color:#ccc;}
.sp-text .album{color:#888;font-size:11px;}

.progress{
    height:3px;
    background:rgba(255,255,255,0.1);
    border-radius:5px;
    overflow:hidden;
    margin-top:5px;
}

.bar{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:.3s;
}

/* ===== LINKS ===== */
.link{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px;
    margin-top:10px;
    background:rgba(255,255,255,0.04);
    border-radius:10px;
    text-decoration:none;
    color:white;
    transition:.2s;
}

.link:hover{
    transform:translateY(-2px);
    background:rgba(0,255,200,0.15);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="server" onclick="switchTab(0)">👤</div>
    <div class="server" onclick="switchTab(1)">🎵</div>
    <div class="server" onclick="switchTab(2)">🔗</div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- CHANNEL LIST -->
    <div class="channels">
        <div class="channel active" onclick="switchTab(0)">Profile</div>
        <div class="channel" onclick="switchTab(1)">Activity</div>
        <div class="channel" onclick="switchTab(2)">Links</div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- PROFILE -->
        <div class="panel active">
            <div class="card">
                <div class="avatar-wrap">
                    <div class="ring"></div>
                    <img id="avatar" class="avatar">
                </div>

                <div class="name" id="name">Loading...</div>

                <div class="status">
                    <div id="dot" class="dot offline"></div>
                    <span id="statusText">Loading status</span>
                </div>
            </div>
        </div>

        <!-- ACTIVITY -->
        <div class="panel">
            <div id="spotify"></div>
        </div>

        <!-- LINKS -->
        <div class="panel">
            <a class="link" href="https://github.com/Leon6454" target="_blank">💻 GitHub</a>
            <a class="link" href="https://www.roblox.com/users/1083628572/profile" target="_blank">🎮 Roblox</a>
            <a class="link" href="https://discord.gg/jfzVYKyBPe" target="_blank">💬 Discord Server</a>
        </div>

    </div>
</div>

<script>
const USER_ID="618051457236598785";

/* tabs */
function switchTab(i){
    document.querySelectorAll(".channel").forEach((c,idx)=>{
        c.classList.toggle("active",idx===i);
    });

    document.querySelectorAll(".panel").forEach((p,idx)=>{
        p.classList.toggle("active",idx===i);
    });
}

/* status */
function setStatus(s){
    const dot=document.getElementById("dot");

    dot.className="dot "+s;

    if(s==="online")document.getElementById("statusText").innerText="Online";
    else if(s==="idle")document.getElementById("statusText").innerText="Idle";
    else if(s==="dnd")document.getElementById("statusText").innerText="Do Not Disturb";
    else document.getElementById("statusText").innerText="Offline";
}

/* load */
async function load(){
    const res=await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
    const d=(await res.json()).data;

    document.getElementById("avatar").src=
    `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

    document.getElementById("name").innerText=
    d.discord_user.global_name||d.discord_user.username;

    setStatus(d.discord_status);

    const sp=document.getElementById("spotify");

    if(d.listening_to_spotify){
        const song=d.spotify.song;
        const artist=d.spotify.artist;
        const album=d.spotify.album;
        const img=d.spotify.album_art_url;

        const start=d.spotify.timestamps.start;
        const end=d.spotify.timestamps.end;

        sp.innerHTML=`
        <div class="spotify">
            <img src="${img}">
            <div class="sp-text">
                <div class="artist">${artist}</div>
                <div class="song">${song}</div>
                <div class="album">${album}</div>
                <div class="progress"><div class="bar" id="bar"></div></div>
            </div>
        </div>`;

        const bar=document.getElementById("bar");

        setInterval(()=>{
            const now=Date.now();
            const p=((now-start)/(end-start))*100;
            bar.style.width=p+"%";
        },500);
    }
}

load();
</script>

</body>
</html>
