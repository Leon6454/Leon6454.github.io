<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.45);
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
}

.pfp {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    margin-bottom: 10px;
    object-fit: cover;
}

h1 {
    margin: 5px;
    font-size: 34px;
    letter-spacing: 2px;
}

.status {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
}

.activity {
    font-size: 12px;
    color: #00ffc3;
    margin-bottom: 15px;
}

a {
    display: block;
    margin: 8px auto;
    width: 180px;
    padding: 10px;
    text-decoration: none;
    color: white;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.25s;
}

a:hover {
    background: rgba(0,255,200,0.15);
    transform: scale(1.05);
}
</style>
</head>

<body>

<canvas id="rain"></canvas>
<div class="overlay"></div>

<div class="container">
    <img id="avatar" class="pfp" src="" />
    <h1 id="name">Loading...</h1>

    <div class="status" id="status">Fetching status...</div>
    <div class="activity" id="activity">...</div>

    <a href="https://discord.com" target="_blank">Discord</a>
    <a href="https://github.com" target="_blank">GitHub</a>
</div>

<script>
const USER_ID = "618051457236598785";

async function load() {
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        const d = json.data;

        // avatar
        const avatarURL = d.discord_user.avatar
            ? `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`
            : `https://cdn.discordapp.com/embed/avatars/0.png`;

        document.getElementById("avatar").src = avatarURL;

        // username
        document.getElementById("name").innerText =
            d.discord_user.global_name || d.discord_user.username;

        // status
        document.getElementById("status").innerText =
            "Status: " + d.discord_status;

        // activity
        if (d.activities && d.activities.length > 0) {
            document.getElementById("activity").innerText =
                "Playing: " + d.activities[0].name;
        } else {
            document.getElementById("activity").innerText =
                "No activity";
        }

    } catch (e) {
        document.getElementById("status").innerText =
            "Failed to load Discord status";
    }
}

load();

/* 🌧️ Rain effect */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 120; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        l: Math.random() * 20 + 10,
        s: Math.random() * 5 + 2
    });
}

function rain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(0,255,200,0.12)";
    ctx.lineWidth = 1;

    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.l);
        ctx.stroke();

        d.y += d.s;
        if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(rain);
}

rain();
</script>

</body>
</html>
