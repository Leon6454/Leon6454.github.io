<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Advertising</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    cursor: none;
}

/* 🌧️ rain canvas */
#rain {
    position: absolute;
    top: 0;
    left: 0;
}

/* 🌫️ blur + fog */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    background: radial-gradient(circle at center, rgba(0,255,200,0.05), rgba(0,0,0,0.8));
    z-index: 1;
}

/* 💀 center content */
.center {
    position: absolute;
    z-index: 3;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* 🔥 main title */
h1 {
    font-size: 48px;
    letter-spacing: 8px;
    margin: 0;
    text-transform: uppercase;
    animation: glow 2.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(0,255,200,0.2); }
    to { text-shadow: 0 0 30px rgba(0,255,200,0.7); }
}

/* 🧠 subtitle */
p {
    color: #aaa;
    font-size: 13px;
    margin-top: 10px;
}

/* ⚡ scanlines */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    z-index: 2;
}

/* ⚡ intro glitch */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    letter-spacing: 5px;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); opacity: 1; }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-1px,1px); }
    100% { transform: translate(0); opacity: 0.9; }
}

/* 🖱️ cursor trail */
.trail {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0,255,200,0.8);
    pointer-events: none;
    box-shadow: 0 0 12px rgba(0,255,200,0.7);
    animation: fade 0.8s linear forwards;
}

@keyframes fade {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.2); }
}

/* 🧠 hidden system feed */
.feed {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 11px;
    color: rgba(0,255,200,0.5);
    z-index: 3;
}
</style>
</head>

<body>

<div id="intro">BOOTING OBSIDIAN SYSTEM...</div>

<canvas id="rain"></canvas>
<div class="overlay"></div>

<div class="center">
    <h1>OBSIDIAN ADVERTISING</h1>
    <p>digital identity engineering</p>
</div>

<div class="feed" id="feed"></div>

<script>
/* 🌧️ rain system */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 140; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        l: Math.random() * 20 + 10,
        s: Math.random() * 5 + 2
    });
}

function rain() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = "rgba(0,255,200,0.12)";
    ctx.lineWidth = 1;

    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y + d.l);
        ctx.stroke();

        d.y += d.s;
        if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(rain);
}
rain();

/* ⚡ intro remove */
setTimeout(() => {
    document.getElementById("intro").style.display = "none";
}, 1500);

/* 🖱️ cursor trail */
document.addEventListener("mousemove", e => {
    const dot = document.createElement("div");
    dot.className = "trail";
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";

    document.body.appendChild(dot);

    setTimeout(() => dot.remove(), 800);
});

/* 🧠 fake system feed */
const messages = [
    "initializing identity layer...",
    "syncing obisidian nodes...",
    "rendering interface...",
    "applying aesthetic protocol...",
    "connection stable."
];

let i = 0;
setInterval(() => {
    document.getElementById("feed").innerText = messages[i % messages.length];
    i++;
}, 2000);
</script>

</body>
</html>
