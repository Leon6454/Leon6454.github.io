<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    color: white;
}

.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,200,0.08), transparent 60%);
}

.card {
    position: relative;
    z-index: 2;
    width: 340px;
    padding: 25px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
}

.pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 10px;
}

h1 {
    margin: 5px 0;
    font-size: 22px;
}

/* STATUS */
.status {
    font-size: 13px;
    margin-bottom: 10px;
}

.online-text { color: #2ecc71; }
.idle-text { color: #f1c40f; }
.dnd-text { color: #e74c3c; }
.offline-text { color: #7f8c8d; }

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}

.online { background: #2ecc71; }
.idle { background: #f1c40f; }
.dnd { background: #e74c3c; }
.offline { background: #7f8c8d; }

/* typing dots */
.dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    margin: 0 2px;
    background: currentColor;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
    0%,80%,100%{transform:translateY(0);}
    40%{transform:translateY(-6px);}
}

/* 🎵 SPOTIFY ROW */
.spotify {
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 10px;
}

/* left text */
.sp-text {
    text-align: left;
    font-size: 13px;
}

.sp-text a {
    display: block;
    color: #ddd;
    text-decoration: none;
    margin: 2px 0;
}

.sp-text a:hover {
    color: #00ffc8;
}

/* album cover */
.sp-img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
}

/* progress bar */
.progress {
    height: 4px;
    background: rgba(255,255,255,0.1);
    margin-top: 6px;
    border-radius: 5px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: #00ffc8;
    width: 0%;
}

/* BUTTONS */
.button {
    display: block;
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.2s;
}

.button:hover {
    background: rgba(0,255,200,0.15);
    transform: translateY(-2px);
}

/* MAIN CTA */
.main-btn {
    background: linear-gradient(90deg, #00ffc8, #00bfff);
    box-shadow: 0 0 15px rgba(0,255,200,0.5);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(0,255,200,0.4); }
    50% { box-shadow: 0 0 25px rgba(0,255,200,0.9); }
    100% { box-shadow: 0 0 10px rgba(0,255,200,0.4); }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <img id="avatar" class="pfp">
    <h1 id="name">Loading...</h1>

    <div class="status">
        <span id="dot" class="dot offline"></span>
        <span id="statusText">Loading</span>
        <span class="dots"><span></span><span></span><span></span></span>
    </div>

    <!-- SPOTIFY -->
    <div id="spotify"></div>

    <!-- LINKS -->
    <a class="button" href="https://www.roblox.com/users/1083628572/profile" target="_blank">
        Roblox Profile
    </a>

    <a class="button" href="https://github.com/Leon6454" target="_blank">
        GitHub
    </a>

    <a class="button main-btn" href="https://discord.gg/jfzVYKyBPe" target="_blank">
        Join Advertising Server
    </a>
</div>

<script>
const USER_ID = "618051457236598785";

/* typing */
function typeText(text, cls){
    const el = document.getElementById("statusText");
    el.className = cls;
    el.innerText = "";
    let i=0;
    const int = setInterval(()=>{
        el.innerText += text[i];
        i++;
        if(i>=text.length) clearInterval(int);
    },30);
}

function setStatus(s){
    document.getElementById("dot").className="dot "+s;
    if(s==="online") typeText("Leon is online","online-text");
    else if(s==="idle") typeText("Leon is idle","idle-text");
    else if(s==="dnd") typeText("Leon is busy","dnd-text");
    else typeText("Leon is offline / hidden","offline-text");
}

async function load(){
    const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
    const d = (await res.json()).data;

    document.getElementById("avatar").src =
        `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

    document.getElementById("name").innerText =
        d.discord_user.global_name || d.discord_user.username;

    setStatus(d.discord_status);

    const sp = document.getElementById("spotify");

    if(d.listening_to_spotify){
        const song = d.spotify.song;
        const artist = d.spotify.artist;
        const album = d.spotify.album;
        const img = d.spotify.album_art_url;

        const start = d.spotify.timestamps.start;
        const end = d.spotify.timestamps.end;

        sp.innerHTML = `
            <div class="spotify">
                <div class="sp-text">
                    <a href="https://open.spotify.com/search/${encodeURIComponent(song)}" target="_blank">${song}</a>
                    <a href="https://open.spotify.com/search/${encodeURIComponent(artist)}" target="_blank">${artist}</a>
                    <a href="https://open.spotify.com/search/${encodeURIComponent(album)}" target="_blank">${album}</a>
                    <div class="progress"><div class="progress-bar" id="bar"></div></div>
                </div>
                <img class="sp-img" src="${img}">
            </div>
        `;

        const bar = document.getElementById("bar");

        setInterval(()=>{
            const now = Date.now();
            const percent = ((now - start)/(end - start))*100;
            bar.style.width = percent+"%";
        },1000);

    } else {
        sp.innerHTML="";
    }
}

load();
</script>

</body>
</html>
