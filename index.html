<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Advertising</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0f14;
    font-family: Arial, sans-serif;
    color: white;
}

/* background */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, rgba(0,255,200,0.08), transparent 60%),
                radial-gradient(circle at bottom, rgba(120,120,255,0.06), transparent 60%);
    z-index: 0;
}

/* layout */
.container {
    z-index: 2;
    width: 100%;
    max-width: 800px;
    padding: 30px;
    text-align: center;
}

/* title */
h1 {
    font-size: 46px;
    letter-spacing: 6px;
    margin: 0;
}

/* subtitle */
.sub {
    color: #aab3c0;
    font-size: 14px;
    margin-top: 10px;
}

/* sections */
.section {
    margin-top: 30px;
}

/* button */
.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    color: white;
    background: rgba(0,255,200,0.12);
    border: 1px solid rgba(0,255,200,0.4);
    transition: 0.2s;
}

.button:hover {
    background: rgba(0,255,200,0.25);
    transform: translateY(-2px);
}

/* profile card */
.card {
    margin: 30px auto;
    width: 280px;
    padding: 20px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
}

.pfp {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.role {
    font-size: 12px;
    color: #00ffc8;
    margin-top: 5px;
}

.status {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>OBSIDIAN ADVERTISING</h1>

    <div class="sub">
        A place to advertise, promote, and grow digital presence.
    </div>

    <div class="section">
        <p><b>We are hiring</b> — open applications for staff, advertisers, and partners.</p>
        <p>Join Obsidian Advertising and become part of a growing network.</p>

        <a class="button" href="https://discord.gg/jfzVYKyBPe" target="_blank">
            Apply / Join Discord
        </a>
    </div>

    <!-- DISCORD PROFILE CARD -->
    <div class="card">
        <img id="avatar" class="pfp" src="">
        <div id="name">Loading...</div>
        <div class="role">Chief Operations Officer</div>
        <div class="status" id="status">Checking status...</div>
    </div>

</div>

<script>
const USER_ID = "618051457236598785";

async function load() {
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        const d = json.data;

        const avatar = d.discord_user.avatar
            ? `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`
            : `https://cdn.discordapp.com/embed/avatars/0.png`;

        document.getElementById("avatar").src = avatar;

        document.getElementById("name").innerText =
            d.discord_user.global_name || d.discord_user.username;

        document.getElementById("status").innerText =
            "Status: " + d.discord_status;

    } catch (e) {
        document.getElementById("status").innerText =
            "Status: offline";
    }
}

load();
</script>

</body>
</html>
